<!DOCTYPE html>
<html>
<head>
  <title>Visitor Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      flex: 1;
      padding: 20px;
      border-radius: 10px;
      background: #1e293b;
      text-align: center;
    }

    .table {
      margin-top: 30px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      color: white;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>👁 Visitor Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h2>3</h2>
      <p>Total Visits</p>
    </div>

    <div class="card">
      <h2>3</h2>
      <p>Unique Names</p>
    </div>

    <div class="card">
      <h2>3</h2>
      <p>Last 24 Hours</p>
    </div>
  </div>

  <div class="table">
    <h3>All Visitors</h3>
    <table>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Time</th>
      </tr>

      <tr>
        <td>1</td>
        <td>Aman</td>
        <td>Now</td>
      </tr>

      <tr>
        <td>2</td>
        <td>Uday</td>
        <td>Now</td>
      </tr>

    </table>
  </div>

  <a href="/logout">
    <button>Logout</button>
  </a>

</div>

</body>
</html>
